<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>EduScroll</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#080c14;--sur:#111827;--sur2:#1a2438;--red:#e94560;--grn:#00d4aa;--gld:#f5a623;--txt:#f0f4ff;--mut:#6b7a99;--nav:65px;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--txt);width:100%;height:100dvh;overflow:hidden;}

/* ── LOADING ── */
#loadingScreen{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;}
.spin{width:44px;height:44px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--red);border-radius:50%;animation:sp .8s linear infinite;margin-bottom:14px;}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── LOGIN ── */
#loginScreen{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:radial-gradient(ellipse at 20% 20%,#1a0a2e,#080c14 50%,#001a2e);z-index:100;}
#loginScreen.active{display:flex;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.22;pointer-events:none;}
.o1{width:480px;height:480px;background:#e94560;top:-140px;left:-140px;animation:ob 9s ease-in-out infinite;}
.o2{width:380px;height:380px;background:#00d4aa;bottom:-100px;right:-100px;animation:ob 12s ease-in-out infinite reverse;}
@keyframes ob{0%,100%{transform:translate(0,0)}50%{transform:translate(35px,-35px)}}
.card{background:rgba(255,255,255,.04);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:26px;padding:36px 30px;width:360px;max-width:92vw;z-index:10;max-height:92dvh;overflow-y:auto;}
.logo{text-align:center;margin-bottom:26px;}
.lbox{width:58px;height:58px;background:linear-gradient(135deg,#e94560,#0f3460);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:10px;box-shadow:0 10px 36px rgba(233,69,96,.4);}
.lname{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;background:linear-gradient(135deg,#fff 40%,#6b7a99);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.ltag{font-size:12px;color:var(--mut);margin-top:2px;}
.rtabs{display:flex;background:rgba(255,255,255,.05);border-radius:11px;padding:4px;margin-bottom:20px;gap:3px;}
.rtab{flex:1;padding:9px;text-align:center;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;color:var(--mut);transition:.2s;}
.rtab.on{background:var(--red);color:#fff;}
.fg{margin-bottom:12px;}
.fl{font-size:12px;color:var(--mut);margin-bottom:5px;display:block;font-weight:600;}
.fi{width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.09);border-radius:10px;padding:11px 13px;color:var(--txt);font-family:inherit;font-size:14px;outline:none;}
.fi:focus{border-color:var(--red);}
.fi option{background:#111827;}
.brow{display:flex;gap:8px;margin-top:6px;}
.btn{flex:1;padding:12px;border:none;border-radius:10px;color:#fff;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;}
.btn-r{background:linear-gradient(135deg,#e94560,#b02040);}
.btn-g{background:linear-gradient(135deg,#00d4aa,#009977);}
.hint{text-align:center;margin-top:12px;font-size:12px;color:var(--mut);}
.hint span{color:var(--red);cursor:pointer;font-weight:700;}
.errmsg{background:rgba(233,69,96,.12);border:1px solid rgba(233,69,96,.3);border-radius:9px;padding:9px 12px;font-size:13px;color:#ff8090;margin-bottom:12px;display:none;}
.errmsg.show{display:block;}

/* ── MAIN APP ── */
#mainApp{position:absolute;inset:0;display:none;}
#mainApp.active{display:block;}

/* ── NAVBAR ── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:var(--nav);background:rgba(5,8,16,.97);border-top:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:space-around;z-index:1000;padding-bottom:env(safe-area-inset-bottom);}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 14px;color:var(--mut);font-size:10px;font-weight:700;border:none;background:none;font-family:inherit;}
.ni.on{color:var(--red);}
.nicon{font-size:22px;line-height:1;}

/* ── TAB CONTAINER ── */
.tab-page{position:absolute;top:0;left:0;right:0;bottom:var(--nav);display:none;flex-direction:column;overflow:hidden;}
.tab-page.active{display:flex;}

/* ── FEED ── */
#feedPage{background:#000;}
/* Slides container - hanya ini yang scroll/swipe */
#vc{position:absolute;inset:0;display:flex;flex-direction:column;transition:transform .4s cubic-bezier(.25,.46,.45,.94);}
.vs{width:100%;flex-shrink:0;position:relative;background:#000;}
.vs iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.vov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.2) 45%,transparent 65%);pointer-events:none;}

/* Progress bar */
#vbar{position:absolute;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,.15);z-index:10;pointer-events:none;}
#vbf{height:100%;background:linear-gradient(90deg,var(--red),var(--gld));transition:width .3s;}
#vcnt{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);border-radius:18px;padding:4px 11px;font-size:12px;font-weight:700;color:rgba(255,255,255,.85);z-index:10;pointer-events:none;}

/* Info video bawah kiri */
#vinfo{position:absolute;bottom:90px;left:16px;right:80px;z-index:10;pointer-events:none;}
.vbdg{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:18px;font-size:10px;font-weight:800;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;}
.bp{background:rgba(0,212,170,.15);color:var(--grn);border:1px solid rgba(0,212,170,.3);}
.bk{background:rgba(233,69,96,.15);color:var(--red);border:1px solid rgba(233,69,96,.3);}
#vtitle{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;line-height:1.35;margin-bottom:5px;color:#fff;}
#vdesc{font-size:12px;color:rgba(255,255,255,.65);line-height:1.5;}

/* Tombol kuis bawah */
#qpWrap{position:absolute;bottom:16px;left:16px;right:80px;z-index:10;}
#qbtn{width:100%;padding:14px;background:linear-gradient(135deg,#f5a623,#e67e22);border:none;border-radius:13px;color:#fff;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;animation:pu 2s ease-in-out infinite;box-shadow:0 6px 20px rgba(245,166,35,.4);}
@keyframes pu{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}

/* Tombol suka/simpan kanan */
#vact{position:absolute;right:10px;bottom:90px;display:flex;flex-direction:column;gap:16px;z-index:10;}
.ab{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;border:none;background:none;font-family:inherit;}
.ai{width:46px;height:46px;background:rgba(255,255,255,.12);backdrop-filter:blur(10px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;border:1px solid rgba(255,255,255,.15);}
.al{font-size:10px;color:rgba(255,255,255,.75);font-weight:700;}

/* Empty state */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;padding:36px;text-align:center;}
.eico{font-size:60px;}
.etit{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;}
.esub{font-size:13px;color:var(--mut);line-height:1.6;}

/* ── LEADERBOARD ── */
#lbPage{background:var(--bg);}
.pghdr{background:linear-gradient(135deg,var(--sur),var(--sur2));padding:20px 18px 16px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.07);}
.pgtit{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;}
.pgsub{font-size:12px;color:var(--mut);margin-top:2px;}
.pgbody{flex:1;overflow-y:auto;padding:14px;}
.lbts{display:flex;gap:7px;margin-top:12px;}
.lbtb{flex:1;padding:9px;border:2px solid rgba(255,255,255,.08);border-radius:9px;background:transparent;color:var(--mut);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;}
.lbtb.ap{border-color:var(--grn);color:var(--grn);background:rgba(0,212,170,.07);}
.lbtb.ak{border-color:var(--red);color:var(--red);background:rgba(233,69,96,.07);}
.lbr{display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(255,255,255,.03);border-radius:12px;margin-bottom:7px;border:1px solid rgba(255,255,255,.05);}
.lbr.me{border-color:var(--red);background:rgba(233,69,96,.06);}
.lbrk{font-size:15px;font-weight:800;color:var(--mut);width:26px;text-align:center;}
.lbav{width:40px;height:40px;border-radius:50%;background:var(--sur2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.lbin{flex:1;}
.lbnm{font-size:14px;font-weight:700;}
.lbmt{font-size:11px;color:var(--mut);margin-top:2px;}
.lbpt{font-size:16px;font-weight:800;color:var(--gld);}

/* ── INFO/MATERI ── */
#infoPage{background:var(--bg);}
.icard{background:var(--sur);border-radius:14px;padding:18px;margin-bottom:12px;border:1px solid rgba(255,255,255,.07);}
.icard-title{font-size:14px;font-weight:800;margin-bottom:10px;}
.icard-body{font-size:13px;color:rgba(255,255,255,.75);line-height:1.75;}
.icard-sub{font-size:12px;font-weight:800;color:var(--gld);margin:10px 0 6px;}
.badge-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;}
.badge-item{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-pai{background:rgba(0,212,170,.15);color:var(--grn);border:1px solid rgba(0,212,170,.3);}
.badge-pkn{background:rgba(233,69,96,.15);color:var(--red);border:1px solid rgba(233,69,96,.3);}
.step{display:flex;gap:12px;margin-bottom:11px;align-items:flex-start;}
.step-num{width:26px;height:26px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;margin-top:2px;}
.step-txt{font-size:13px;color:rgba(255,255,255,.8);line-height:1.6;}
.team-card{display:flex;align-items:center;gap:13px;padding:13px;background:var(--sur);border-radius:13px;margin-bottom:8px;border:1px solid rgba(255,255,255,.07);}
.team-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.team-name{font-size:13px;font-weight:800;}
.team-role{font-size:11px;color:var(--mut);margin-top:2px;}

/* ── PROFIL ── */
#profPage{background:var(--bg);overflow-y:auto;}
.ph{background:linear-gradient(135deg,var(--sur),#0f2040);padding:46px 22px 22px;text-align:center;}
.pav{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--gld));display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 12px;border:4px solid rgba(255,255,255,.14);}
.pnm{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
.pkl{font-size:13px;color:var(--mut);margin-top:4px;}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px;}
.sc{background:var(--sur);border-radius:13px;padding:14px 8px;text-align:center;border:1px solid rgba(255,255,255,.07);}
.sv{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--gld);}
.sl{font-size:10px;color:var(--mut);margin-top:3px;font-weight:700;}
.bs{padding:0 16px 16px;}
.stit{font-size:14px;font-weight:800;margin-bottom:10px;}
.bg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.bi{background:var(--sur);border-radius:12px;padding:11px 6px;text-align:center;border:1px solid rgba(255,255,255,.07);}
.bic{font-size:24px;margin-bottom:4px;display:block;}
.bnm{font-size:9px;color:var(--mut);font-weight:700;}
.bi.lk{opacity:.28;filter:grayscale(1);}
.boutbtn{margin:0 16px 24px;width:calc(100% - 32px);padding:12px;background:rgba(233,69,96,.1);border:2px solid rgba(233,69,96,.22);border-radius:11px;color:var(--red);font-family:inherit;font-size:13px;font-weight:800;cursor:pointer;}

/* ── QUIZ MODAL ── */
#qmodal{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.8);backdrop-filter:blur(12px);align-items:flex-end;justify-content:center;}
#qmodal.on{display:flex;}
.qsheet{background:var(--sur);border-radius:26px 26px 0 0;padding:24px 20px 40px;width:100%;max-width:480px;animation:su .33s cubic-bezier(.34,1.56,.64,1);}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.qhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.qtag{font-size:12px;color:var(--gld);font-weight:800;text-transform:uppercase;letter-spacing:1px;}
.qclose{width:32px;height:32px;background:rgba(255,255,255,.07);border:none;border-radius:50%;color:var(--mut);font-size:16px;cursor:pointer;}
.qq{font-size:15px;font-weight:700;line-height:1.55;margin-bottom:16px;color:#fff;}
.qopts{display:flex;flex-direction:column;gap:9px;}
.qopt{padding:12px 15px;background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.09);border-radius:11px;cursor:pointer;font-family:inherit;font-size:13px;color:var(--txt);text-align:left;font-weight:600;}
.qopt.ok{background:rgba(0,212,170,.12);border-color:var(--grn);color:var(--grn);}
.qopt.no{background:rgba(233,69,96,.12);border-color:var(--red);color:var(--red);}
.qopt.dis{pointer-events:none;}
.qresult{display:none;text-align:center;padding:16px 0;}
.qresult.on{display:block;}
.ricon{font-size:56px;display:block;margin-bottom:10px;}
.rtit{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:6px;}
.rpts{font-size:13px;color:var(--gld);font-weight:800;margin-bottom:14px;}
.rexp{background:rgba(255,255,255,.04);border-radius:11px;padding:12px 14px;font-size:13px;color:var(--mut);line-height:1.65;text-align:left;margin-bottom:16px;border-left:3px solid var(--grn);}
.rnext{background:linear-gradient(135deg,var(--red),#b02040);border:none;border-radius:11px;padding:13px 36px;color:#fff;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;}

/* ── TOAST ── */
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--sur2);border:1px solid rgba(255,255,255,.12);border-radius:13px;padding:11px 20px;font-size:13px;font-weight:700;color:#fff;z-index:3000;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px;}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="spin"></div>
  <div style="font-size:13px;color:var(--mut);">Memuat EduScroll...</div>
</div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="orb o1"></div><div class="orb o2"></div>
  <div class="card">
    <div class="logo">
      <div class="lbox">📱</div>
      <div class="lname">EduScroll</div>
      <div class="ltag">Belajar seru, swipe terus!</div>
    </div>
    <div class="rtabs">
      <div class="rtab on" id="tabSiswa" onclick="setRole('siswa')">🎓 Siswa</div>
      <div class="rtab" id="tabGuru" onclick="setRole('guru')">👨‍🏫 Guru</div>
    </div>
    <div class="errmsg" id="errMsg"></div>
    <div class="fg"><label class="fl">Email</label><input class="fi" id="inEmail" type="email" placeholder="email@sekolah.com"></div>
    <div class="fg" id="nameGrp" style="display:none;"><label class="fl">Nama Lengkap</label><input class="fi" id="inName" type="text" placeholder="Nama lengkap..."></div>
    <div class="fg" id="kelasGrp"><label class="fl">Kelas</label>
      <select class="fi" id="inKelas">
        <option value="6A">6A — PAI (Akhlak Digital)</option>
        <option value="6B">6B — PKN (Toleransi Keberagaman)</option>
      </select>
    </div>
    <div class="fg"><label class="fl">Password</label><input class="fi" id="inPass" type="password" placeholder="Min. 6 karakter"></div>
    <div class="fg" id="pass2Grp" style="display:none;"><label class="fl">Konfirmasi Password</label><input class="fi" id="inPass2" type="password" placeholder="Ulangi password"></div>
    <div class="brow">
      <button class="btn btn-r" id="btnLogin" onclick="doLogin()">Masuk →</button>
      <button class="btn btn-g" id="btnReg" onclick="doRegister()" style="display:none;">Daftar ✓</button>
    </div>
    <div class="hint" id="hintTxt">Belum punya akun? <span onclick="toggleReg()">Daftar di sini</span></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp">

  <!-- TAB: BERANDA -->
  <div id="feedPage" class="tab-page active">
    <!-- Slides (swipe area) -->
    <div id="vc"></div>
    <!-- Progress bar (pointer-events:none otomatis karena tidak ada handler) -->
    <div id="vbar"><div id="vbf" style="width:0%"></div></div>
    <div id="vcnt">1/0</div>
    <!-- Info video (pointer-events:none agar swipe tembus) -->
    <div id="vinfo" style="pointer-events:none;">
      <div class="vbdg" id="vbdg"></div>
      <div id="vtitle"></div>
      <div id="vdesc"></div>
    </div>
    <!-- Tombol kuis (pointer-events aktif) -->
    <div id="qpWrap">
      <button id="qbtn" onclick="openQuiz()">🧩 Kerjakan Kuis</button>
    </div>
    <!-- Tombol suka/simpan -->
    <div id="vact">
      <button class="ab" onclick="showToast('❤️ Disukai!')"><div class="ai">❤️</div><div class="al">Suka</div></button>
      <button class="ab" onclick="showToast('🔖 Disimpan!')"><div class="ai">🔖</div><div class="al">Simpan</div></button>
    </div>
  </div>

  <!-- TAB: PERINGKAT -->
  <div id="lbPage" class="tab-page">
    <div class="pghdr">
      <div class="pgtit">🏆 Papan Peringkat</div>
      <div class="pgsub">Siapa raja EduScroll minggu ini?</div>
      <div class="lbts">
        <button class="lbtb ap" id="lbA" onclick="switchLB('6A')">6A — PAI</button>
        <button class="lbtb" id="lbB" onclick="switchLB('6B')">6B — PKN</button>
      </div>
    </div>
    <div class="pgbody" id="lbList"><div style="text-align:center;padding:40px;color:var(--mut);">Memuat...</div></div>
  </div>

  <!-- TAB: MATERI -->
  <div id="infoPage" class="tab-page">
    <div class="pghdr">
      <div class="pgtit">📚 Informasi Pembelajaran</div>
      <div class="pgsub">CP, TP, Materi, Panduan & Tim</div>
    </div>
    <div class="pgbody" id="infoBody"></div>
  </div>

  <!-- TAB: PROFIL -->
  <div id="profPage" class="tab-page">
    <div id="profContent"></div>
  </div>

  <!-- NAVBAR -->
  <nav class="nav">
    <button class="ni on" id="nHome" onclick="goTab('home')"><div class="nicon">🏠</div>Beranda</button>
    <button class="ni" id="nLb" onclick="goTab('lb')"><div class="nicon">🏆</div>Peringkat</button>
    <button class="ni" id="nInfo" onclick="goTab('info')"><div class="nicon">📚</div>Materi</button>
    <button class="ni" id="nProf" onclick="goTab('prof')"><div class="nicon">👤</div>Profil</button>
  </nav>

</div>

<!-- QUIZ MODAL -->
<div id="qmodal">
  <div class="qsheet">
    <div class="qhead">
      <span class="qtag">🧩 Kuis Cepat!</span>
      <button class="qclose" onclick="closeQuiz()">✕</button>
    </div>
    <div id="qbody">
      <div class="qq" id="qq"></div>
      <div class="qopts" id="qopts"></div>
    </div>
    <div class="qresult" id="qresult">
      <span class="ricon" id="ricon"></span>
      <div class="rtit" id="rtit"></div>
      <div class="rpts" id="rpts"></div>
      <div class="rexp" id="rexp"></div>
      <button class="rnext" onclick="closeQuiz(true)">Lanjut Nonton ▶</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

window.showToast = msg => {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
};
const showErr = msg => {
  const e=document.getElementById('errMsg');
  e.textContent=msg; e.classList.add('show');
  setTimeout(()=>e.classList.remove('show'),4000);
};
const showScreen = id => {
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('mainApp').classList.remove('active');
  if(id==='login') document.getElementById('loginScreen').classList.add('active');
  else if(id==='app') document.getElementById('mainApp').classList.add('active');
  else document.getElementById('loadingScreen').style.display='flex';
};

// ── AUTH ──
onAuthStateChanged(auth, async user => {
  if(!user){showScreen('login');return;}
  try{
    const ud=await getDoc(doc(db,'users',user.uid));
    if(!ud.exists()){showScreen('login');return;}
    CU={uid:user.uid,...ud.data()};
    if(CU.role==='guru'){window.location.href='guru.html';return;}
    videos=await loadVids(CU.kelas);
    showScreen('app');
    buildFeed();
    buildInfo();
    renderLB();
  }catch(e){console.error(e);showScreen('login');}
});

window.doLogin = async () => {
  const email=document.getElementById('inEmail').value.trim();
  const pass=document.getElementById('inPass').value;
  if(!email||!pass){showErr('Email dan password wajib diisi!');return;}
  try{showScreen('loading');await signInWithEmailAndPassword(auth,email,pass);}
  catch(e){showScreen('login');showErr('Email atau password salah!');}
};
window.doRegister = async () => {
  const email=document.getElementById('inEmail').value.trim();
  const name=document.getElementById('inName').value.trim();
  const kelas=document.getElementById('inKelas').value;
  const pass=document.getElementById('inPass').value;
  const pass2=document.getElementById('inPass2').value;
  if(!email||!name||!pass){showErr('Semua field wajib diisi!');return;}
  if(pass!==pass2){showErr('Password tidak cocok!');return;}
  if(pass.length<6){showErr('Password minimal 6 karakter!');return;}
  try{
    showScreen('loading');
    const cred=await createUserWithEmailAndPassword(auth,email,pass);
    await setDoc(doc(db,'users',cred.user.uid),{
      name,email,kelas,role,
      emoji:EMOJIS[Math.floor(Math.random()*EMOJIS.length)],
      points:0,completedVideos:[],createdAt:new Date().toISOString()
    });
  }catch(e){showScreen('login');showErr(e.code==='auth/email-already-in-use'?'Email sudah terdaftar!':'Gagal daftar: '+e.message);}
};

// ── LOAD VIDEOS ──
async function loadVids(kelas){
  try{
    const snap=await getDocs(query(collection(db,'videos'),where('kelas','==',kelas)));
    const list=snap.docs.map(d=>({id:d.id,...d.data()}));
    list.sort((a,b)=>(a.order||0)-(b.order||0));
    return list;
  }catch(e){console.error(e);return[];}
}

// ── FEED ──
function buildFeed(){
  const vc=document.getElementById('vc');
  // Set tinggi slide sesuai feedPage
  const fp=document.getElementById('feedPage');
  const h=fp.clientHeight;

  if(!videos.length){
    vc.innerHTML='<div class="empty"><div class="eico">🎬</div><div class="etit">Belum Ada Video</div><div class="esub">Guru belum menambahkan video.<br>Tunggu sebentar ya!</div></div>';
    document.getElementById('vcnt').textContent='0/0';
    document.getElementById('qpWrap').style.display='none';
    document.getElementById('vinfo').style.display='none';
    document.getElementById('vact').style.display='none';
    return;
  }

  vc.innerHTML='';
  videos.forEach(v=>{
    const s=document.createElement('div');
    s.className='vs';
    s.style.height=h+'px';
    s.innerHTML='<iframe src="https://www.youtube.com/embed/'+v.youtubeId+'?rel=0&modestbranding=1" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope" allowfullscreen></iframe><div class="vov"></div>';
    vc.appendChild(s);
  });

  goTo(0, false);
  initSwipe();
}

function goTo(i, animate=true){
  idx=i;
  const fp=document.getElementById('feedPage');
  const h=fp.clientHeight;
  document.getElementById('vc').style.transition=animate?'transform .4s cubic-bezier(.25,.46,.45,.94)':'none';
  document.getElementById('vc').style.transform='translateY(-'+(i*h)+'px)';
  updateUI();
}

function updateUI(){
  if(!videos.length)return;
  const v=videos[idx];
  const done=CU.completedVideos||[];
  const isPAI=CU.kelas==='6A';
  const bdg=document.getElementById('vbdg');
  bdg.className='vbdg '+(isPAI?'bp':'bk');
  bdg.textContent=(isPAI?'🕌':'🤝')+' '+v.dimension;
  document.getElementById('vtitle').textContent=v.title;
  document.getElementById('vdesc').textContent=v.desc||'';
  document.getElementById('qbtn').textContent=done.includes(v.id)?'🧩 Kerjakan Kuis ✅':'🧩 Kerjakan Kuis';
  const p=videos.length>1?(idx/(videos.length-1))*100:0;
  document.getElementById('vbf').style.width=p+'%';
  document.getElementById('vcnt').textContent=(idx+1)+'/'+videos.length;
}

function initSwipe(){
  const fp=document.getElementById('feedPage');
  let startY=0, moved=false;

  fp.addEventListener('touchstart',e=>{
    // Abaikan jika dari tombol
    if(e.target.closest('button')||e.target.closest('.ab')) return;
    startY=e.touches[0].clientY;
    moved=false;
  },{passive:true});

  fp.addEventListener('touchmove',e=>{
    moved=true;
  },{passive:true});

  fp.addEventListener('touchend',e=>{
    if(e.target.closest('button')||e.target.closest('.ab')) return;
    if(!moved) return;
    const dy=startY-e.changedTouches[0].clientY;
    if(Math.abs(dy)<50) return;
    if(dy>0) nextVideo(); else prevVideo();
  },{passive:true});

  // Mouse wheel (PC)
  let acc=0,tmr=null;
  fp.addEventListener('wheel',e=>{
    e.preventDefault();
    acc+=e.deltaY;
    clearTimeout(tmr);
    tmr=setTimeout(()=>{
      if(Math.abs(acc)>80){acc>0?nextVideo():prevVideo();}
      acc=0;
    },80);
  },{passive:false});
}

function nextVideo(){
  if(busy)return;
  if(idx<videos.length-1){busy=true;goTo(idx+1);setTimeout(()=>busy=false,500);}
  else showToast('🎉 Semua video sudah ditonton!');
}
function prevVideo(){
  if(busy)return;
  if(idx>0){busy=true;goTo(idx-1);setTimeout(()=>busy=false,500);}
}

// ── TABS ──
window.goTab = tab => {
  const pages={home:'feedPage',lb:'lbPage',info:'infoPage',prof:'profPage'};
  const navs={home:'nHome',lb:'nLb',info:'nInfo',prof:'nProf'};
  Object.values(pages).forEach(id=>document.getElementById(id).classList.remove('active'));
  Object.values(navs).forEach(id=>document.getElementById(id).classList.remove('on'));
  document.getElementById(pages[tab]).classList.add('active');
  document.getElementById(navs[tab]).classList.add('on');
  if(tab==='lb') renderLB();
  if(tab==='prof') renderProf();
};

async function renderLB(){
  document.getElementById('lbList').innerHTML='<div style="text-align:center;padding:40px;color:var(--mut);">Memuat...</div>';
  try{
    const snap=await getDocs(query(collection(db,'users'),where('kelas','==',lbCls),where('role','==','siswa')));
    if(snap.empty){document.getElementById('lbList').innerHTML='<div style="text-align:center;padding:40px;color:var(--mut);">Belum ada siswa.</div>';return;}
    const list=snap.docs.map(d=>({uid:d.id,...d.data()}));
    list.sort((a,b)=>(b.points||0)-(a.points||0));
    const medals=['🥇','🥈','🥉'];
    document.getElementById('lbList').innerHTML=list.slice(0,20).map((u,i)=>{
      const me=u.uid===CU.uid;
      return '<div class="lbr'+(me?' me':'')+'"><div class="lbrk">'+(medals[i]||i+1)+'</div>'
        +'<div class="lbav">'+(u.emoji||'😊')+'</div>'
        +'<div class="lbin"><div class="lbnm">'+(me?'⭐ '+u.name+' (Kamu)':u.name)+'</div>'
        +'<div class="lbmt">'+((u.completedVideos||[]).length)+' video selesai</div></div>'
        +'<div class="lbpt">'+(u.points||0)+'</div></div>';
    }).join('');
  }catch(e){document.getElementById('lbList').innerHTML='<div style="text-align:center;padding:40px;color:var(--mut);">Gagal memuat.</div>';}
}

// ── QUIZ ──
window.openQuiz = () => {
  if(!videos.length)return;
  const v=videos[idx];
  if(!v||!v.quiz)return;
  document.getElementById('qq').textContent=v.quiz.question;
  document.getElementById('qopts').innerHTML=v.quiz.options.map((o,j)=>
    '<button class="qopt" onclick="answerQ('+j+')">'+'ABCD'[j]+'. '+o+'</button>'
  ).join('');
  document.getElementById('qbody').style.display='block';
  document.getElementById('qresult').classList.remove('on');
  document.getElementById('qmodal').classList.add('on');
};

window.answerQ = async chosen => {
  const v=videos[idx];
  const correct=v.quiz.correct;
  document.querySelectorAll('.qopt').forEach((o,i)=>{
    o.classList.add('dis');
    if(i===correct) o.classList.add('ok');
    else if(i===chosen) o.classList.add('no');
  });
  const ok=chosen===correct;
  const gained=ok?100:20;
  setTimeout(async()=>{
    document.getElementById('qbody').style.display='none';
    document.getElementById('qresult').classList.add('on');
    document.getElementById('ricon').textContent=ok?'🎉':'💪';
    document.getElementById('rtit').textContent=ok?'Jawaban Benar!':'Hampir Benar!';
    document.getElementById('rpts').textContent='+'+gained+' poin'+(ok?' 🔥':'');
    document.getElementById('rexp').textContent='💡 '+v.quiz.explanation;
    const done=CU.completedVideos||[];
    const newDone=done.includes(v.id)?done:[...done,v.id];
    const newPts=(CU.points||0)+gained;
    try{
      await updateDoc(doc(db,'users',CU.uid),{points:newPts,completedVideos:newDone});
      CU.points=newPts; CU.completedVideos=newDone;
      updateUI();
    }catch(e){console.error(e);}
  },700);
};

window.closeQuiz = (next=false) => {
  document.getElementById('qmodal').classList.remove('on');
  if(next && idx<videos.length-1) goTo(idx+1);
};
